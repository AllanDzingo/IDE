# fly.toml app configuration file generated for ide on 2026-07-07T10:57:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ide'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  SHELL = '/bin/bash'

[processes]
  app = 'code-server --config /home/coder/.config/code-server/config.yaml'

[[mounts]]
  source = 'workspace_data'
  destination = '/home/coder/workspace'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
