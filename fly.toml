# ===========================================================
# fly.toml — code-server on Fly.io
# Scale-to-zero configuration using Fly Machines
# ===========================================================

app = "codespace"  # Change this to your desired app name

# Primary region (change to your closest region)
primary_region = "ams"  # Amsterdam — good for EU/Africa latency

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true    # ★ Scale-to-zero: stop when idle
  auto_start_machines = true   # ★ Scale-to-zero: start on HTTP request
  min_machines_running = 0     # ★ Scale-to-zero: allow 0 machines when idle
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

# ── Persistent Volume ─────────────────────────────────────
# Create with: fly volumes create workspace_data --region ams --size 10
[mounts]
  source = "workspace_data"
  destination = "/home/coder/workspace"

# ── Environment Variables ─────────────────────────────────
[env]
  # PASSWORD is set via `fly secrets set PASSWORD=your-secure-password`
  # DO NOT hardcode secrets here
  SHELL = "/bin/bash"

# ── Fly Machines Configuration ────────────────────────────
# These settings control the VM size and auto-scaling behavior
# The "shared-cpu-1x" machine is the cheapest ($0.0015/min = ~$2.16/month
# if running 24/7, but with scale-to-zero it's much less)
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# ── Processes ─────────────────────────────────────────────
# Single process: the code-server web server
[processes]
  app = "code-server --config /home/coder/.config/code-server/config.yaml"